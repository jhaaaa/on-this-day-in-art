# yaml-language-server: $schema=https://astropods.com/schema/package.json
spec: package/v1
name: on-this-day-in-art
meta: {}

agent:
  build:
    context: .
    dockerfile: Dockerfile
  inputs:
    - name: GEMINI_API_KEY
      datatype: string
      secret: true
      description: "Google Gemini API key — used by the MCP server for Chillomena Punk commentary"

models:
  anthropic:
    provider: anthropic

dev:
  interfaces:
    messaging:
      adapters: [web]
